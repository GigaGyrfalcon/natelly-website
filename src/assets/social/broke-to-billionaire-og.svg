<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Broke to Billionaire social preview</title>
  <desc id="desc">Broke to Billionaire is a progression-based mobile game by Natelly, available on the App Store.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16365d" />
      <stop offset="100%" stop-color="#1d466f" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd76f" />
      <stop offset="100%" stop-color="#ffb458" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#06111f" flood-opacity="0.22" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="96" cy="88" r="176" fill="#2d547d" />
  <circle cx="1118" cy="538" r="196" fill="#0f5053" />

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="86" y="78" width="252" height="42" rx="21" fill="#e9fff8" fill-opacity="0.12" />
    <text x="108" y="106" font-size="22" font-weight="700" letter-spacing="4" fill="#d7fff3">NOW ON THE APP STORE</text>
    <text x="86" y="212" font-size="86" font-weight="700" fill="#ffffff">Broke to</text>
    <text x="86" y="302" font-size="86" font-weight="700" fill="#ffffff">Billionaire</text>
    <text x="86" y="382" font-size="32" fill="#d2e8ff">Idle mobile game with tapping, upgrades,</text>
    <text x="86" y="424" font-size="32" fill="#d2e8ff">passive income, and prestige.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="86" y="474" width="130" height="58" rx="29" fill="url(#gold)" />
    <rect x="234" y="474" width="182" height="58" rx="29" fill="#23b7b7" />
    <rect x="434" y="474" width="182" height="58" rx="29" fill="#8a6eff" />
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="151" y="512" font-size="26" font-weight="700" text-anchor="middle" fill="#18203b">Tap</text>
    <text x="325" y="512" font-size="26" font-weight="700" text-anchor="middle" fill="#ffffff">Upgrade</text>
    <text x="525" y="512" font-size="26" font-weight="700" text-anchor="middle" fill="#ffffff">Prestige</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="742" y="80" width="338" height="474" rx="44" fill="#f7f5f6" />
    <rect x="786" y="132" width="250" height="112" rx="28" fill="#fff1c7" />
    <rect x="786" y="268" width="250" height="112" rx="28" fill="#e8f8fb" />
    <rect x="786" y="404" width="250" height="112" rx="28" fill="#efeaff" />
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="836" cy="188" r="38" fill="#1f2a4a" stroke="url(#gold)" stroke-width="6" />
    <path d="M820 188h30" stroke="#ffd76f" stroke-width="10" />
    <path d="M836 172v32" stroke="#ffd76f" stroke-width="10" />
    <path d="M814 318h150" stroke="#23b7b7" stroke-width="20" />
    <path d="M814 350h112" stroke="#c6e2ea" stroke-width="20" />
    <path d="M812 462h54l24 24 28-68 28 42h72" stroke="#8a6eff" stroke-width="14" />
  </g>
